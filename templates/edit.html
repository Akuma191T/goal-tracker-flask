<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование цели</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Редактировать цель</h1>

        {% if errors %}
            <div class="error-box">
                <ul>
                    {% for error in errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        <div class="form-block">
            <form method="POST">
                <input type="text" name="title" value="{{ goal.title }}" required>
                <input type="date" name="deadline" value="{{ goal.deadline }}" required>
                <input type="number" name="progress" value="{{ goal.progress }}" min="0" max="100" required>
                <input type="text" name="reminder" value="{{ goal.reminder }}" required>
                <button type="submit">Сохранить</button>
            </form>
        </div>

        <div class="back-link">
            <a href="/">← Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
